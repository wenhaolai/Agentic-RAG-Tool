# Global Configuration for Agentic-Tool

project:
  name: "Agentic-Tool-Reproduction"
  root_dir: "."

paths:
  # 数据存储的根目录
  data_root: "./data"
  # RAG 原始数据保存路径
  rag_corpus_path: "./data/corpus/wiki_zh.jsonl"

# RAG 检索库配置 (External Knowledge Base)
rag_data:
  # HuggingFace 数据集配置
  huggingface_dataset:
    repo_id: "wikimedia/wikipedia"
    subset: "20231101.zh" # 中文维基百科
