# Global Configuration for Agentic-Tool

project:
  name: "Agentic-Tool-Reproduction"
  root_dir: "/root/Agentic-RAG-Tool"

paths:
  # 数据存储的根目录
  data_root: "/root/autodl-tmp/data"
  # RAG 原始数据保存路径
  rag_corpus_path: "/root/autodl-tmp/wikipedia"

# RAG 检索库配置 (External Knowledge Base)
rag_data:
  # HuggingFace 数据集配置
  huggingface_dataset:
    repo_id: "wikimedia/wikipedia"
    subset: "20231101.en" # 中文维基百科

  # Elasticsearch 配置
  elasticsearch:
    host: "http://localhost:9200"
    index_name: "wiki_en"
    username: ""
    password: ""
    
  # 检索参数配置
  retrieval:
    top_k: 5
    score_threshold: 0.0

  # 向量检索配置
  embedding:
    model_name: "BAAI/bge-small-en-v1.5"
    device: "cuda"
    batch_size: 256

  # FAISS 配置
  faiss:
    index_path: "/root/autodl-tmp/faiss_index/wiki_en.index"
    dimension: 384
    index_type: "Flat"

# 模型配置 (Models)
models:
  # 生成模型 (LLM)
  generation:
    model_name: "Qwen/Qwen2.5-0.5B-Instruct"
    local_path: "/root/autodl-tmp/models/Qwen2.5-0.5B-Instruct"
    device: "cuda"

# 训练相关配置参数
train:
  datasets:
    origin_path: "/root/Agentic-RAG-Tool/data/train.parquet"
    process_train_path: "/root/Agentic-RAG-Tool/data/train_grpo.parquet"
    process_eval_path: "/root/Agentic-RAG-Tool/data/eval_grpo.parquet"

